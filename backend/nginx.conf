# Wenyanwen 应用Nginx配置
# 将此文件复制到 /etc/nginx/sites-available/wenyanwen

upstream wenyanwen_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name digitalsonic.top sh.digitalsonic.top;
    
    # 基本安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    
    # 日志
    access_log /var/log/nginx/wenyanwen.access.log;
    error_log /var/log/nginx/wenyanwen.error.log;
    
    # 客户端限制
    client_max_body_size 10M;
    
    # API代理 - 处理后端请求（映射/wenyanwen/api到后端/api）
    location /wenyanwen/api/ {
        rewrite ^/wenyanwen(.*)$ $1 break;
        proxy_pass http://wenyanwen_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    
    location /wenyanwen/docs {
        rewrite ^/wenyanwen(.*)$ $1 break;
        proxy_pass http://wenyanwen_backend;
    }
    
    location /wenyanwen/redoc {
        rewrite ^/wenyanwen(.*)$ $1 break;
        proxy_pass http://wenyanwen_backend;
    }
    
    # 健康检查（无日志）
    location /wenyanwen/health {
        rewrite ^/wenyanwen(.*)$ $1 break;
        proxy_pass http://wenyanwen_backend;
        access_log off;
    }
    
    # Vue前端静态文件（处理/wenyanwen/下的请求）
    location /wenyanwen/ {
        alias /var/www/vue/dist/;
        try_files $uri $uri/ @frontend_fallback;
    }
    
    # 前端fallback处理
    location @frontend_fallback {
        rewrite ^/wenyanwen/(.*)$ /wenyanwen/index.html last;
    }
    
    # 根路径重定向到/wenyanwen/
    location = / {
        return 301 /wenyanwen/;
    }
}

